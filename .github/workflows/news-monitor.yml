name: News Monitor Alerts

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger News Monitor API
        run: |
          curl -X GET "https://traders-world-ai.vercel.app/api/news-monitor?secret=${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            -s -o /dev/null || echo "API call failed"
          
      - name: Log completion
        run: |
          echo "News monitor check completed at $(date)"
